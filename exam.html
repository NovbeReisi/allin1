<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EASA Module 11A — Exam Simulation (140 Questions)</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-shell">
<div id="sidebar">
  <a class="backlink" href="hub.html">&larr; Menu</a>
  <h2>140-Question Exam</h2>
  <div class="grid" id="navgrid"></div>
</div>
<div id="main">
  <div id="topbar">
    <h1>EASA Module 11A — Exam Simulation</h1>
    <div id="meta">Answered: <b id="answeredval">0</b> / 140</div>
  </div>
  <div id="progress-wrap"><div id="progress-bar"></div></div>

  <div id="examview">
    <div id="qcard">
      <div id="qnum"></div>
      <div id="qflag"></div>
      <div id="qtext"></div>
      <div id="options"></div>
    </div>
    <div id="navrow">
      <button class="navbtn" id="prevBtn">&larr; Back</button>
      <button class="navbtn primary" id="submitBtn">Submit exam</button>
      <button class="navbtn" id="nextBtn">Next &rarr;</button>
    </div>
    <div id="hint">Use &larr; &rarr; to navigate &middot; 1 / 2 / 3 to select an answer &middot; nothing is graded until you submit</div>
  </div>

  <div id="donescreen">
    <h2>Exam complete</h2>
    <div class="scoreBig" id="scoreBig">0 / 140</div>
    <div class="pct" id="pctText"></div>
    <div class="doneBtns">
      <button class="navbtn primary" id="btnReview">Review answers</button>
      <button class="navbtn" id="btnRestart">Restart (new 140)</button>
    </div>
  </div>
</div>
</div>

<script src="js/auth.js"></script>
<script>requireAuth();</script>
<script src="data/exam-data.js"></script>
<script src="js/exam.js"></script>
</body>
</html>
